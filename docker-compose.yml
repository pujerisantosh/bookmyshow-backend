

services:

  postgres:
    image: postgres:15
    container_name: bookmyshow-postgres
    environment:
      POSTGRES_DB: bookmyshow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bookmyshow-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data: